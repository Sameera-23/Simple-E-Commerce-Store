<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fb;
}

/* Navbar */

.navbar{
    background:white;
    box-shadow:0 2px 15px rgba(0,0,0,.08);
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#4f46e5;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    margin-left:25px;
    font-weight:600;
}

.nav-links a:hover{
    color:#4f46e5;
}

/* Heading */

h1{
    text-align:center;
    margin:35px 0;
    color:#222;
}

/* Cart Container */

#cartItems{
    width:90%;
    max-width:1100px;
    margin:auto;
}

/* Product Card */

.item-card{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:18px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.item-card:hover{
    transform:translateY(-5px);
}

.item-card h3{
    font-size:22px;
    margin-bottom:10px;
    color:#111827;
}

.item-card p{
    color:#666;
    margin-bottom:10px;
}

/* Quantity */

.quantity-box{
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;
}

.quantity-box button{
    width:40px;
    height:40px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.quantity-box button:hover{
    background:#4338ca;
}

.quantity-box span{
    font-size:18px;
    font-weight:bold;
    min-width:30px;
    text-align:center;
}

/* Buttons */

.remove-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
}

.remove-btn:hover{
    background:#dc2626;
}

.buy-btn{
    background:#f59e0b;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

.buy-btn:hover{
    background:#d97706;
}

/* Summary */

.summary{
    background:white;
    padding:25px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
    margin-top:20px;
}

.summary h2{
    color:#111827;
    margin-bottom:15px;
}

.order-btn{
    background:#10b981;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

.order-btn:hover{
    background:#059669;
}

/* Empty Cart */

.empty-cart{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:18px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.empty-cart h2{
    color:#6b7280;
}

/* Mobile */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
        padding:20px;
    }

    .nav-links{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }

    .item-card{
        padding:20px;
    }

    .buy-btn,
    .remove-btn{
        width:100%;
        margin-top:10px;
    }
}
</style></head>
<body><nav class="navbar">

    <div class="logo">
        Fashion Store
    </div>

    <div class="nav-links">

        <a href="products.html">
            Products
        </a>

        <a id="wishlistLink"
           href="wishlist.html">
            ❤️ Wishlist
        </a>

        <a id="cartLink"
           href="cart.html">
            🛒 Cart
        </a>

        <a href="order-history.html">
            📦 Orders
        </a>

        <a href="#" onclick="logout()">
            Logout
        </a>

    </div>

</nav>
<h1>🛒 My Cart</h1>

<div id="cartItems"></div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

// Fix old items without quantity
cart.forEach(item => {
    if(!item.quantity){
        item.quantity = 1;
    }
});

const container =
document.getElementById("cartItems");

function renderCart(){

    container.innerHTML = "";

    let total = 0;

    if(cart.length === 0){

        container.innerHTML = `
            <div class="empty-cart">
                <h2>Your Cart is Empty</h2>
            </div>
        `;
        return;
    }

    cart.forEach((item,index)=>{

        const subtotal =
        item.price * item.quantity;

        total += subtotal;

        container.innerHTML += `
        <div class="item-card">

            <h3>${item.name}</h3>

            <p>Price: ₹${item.price}</p>

            <div class="quantity-box">

                <button onclick="decreaseQty(${index})">
                    -
                </button>

                <span>${item.quantity}</span>

                <button onclick="increaseQty(${index})">
                    +
                </button>

            </div>

            <p>
                Subtotal: ₹${subtotal}
            </p>

            <button
                class="remove-btn"
                onclick="removeFromCart(${index})">
                Remove
            </button>

            <button
                class="buy-btn"
                onclick="buySingleItem(${index})">
                Buy Now
            </button>

        </div>
        `;
    });

    container.innerHTML += `
    <div class="summary">

        <h2>Total Amount: ₹${total}</h2>

        <button
            class="order-btn"
            onclick="placeOrder()">
            Buy All Items
        </button>

    </div>
    `;
}

function increaseQty(index){

    cart[index].quantity++;

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCart();
}

function decreaseQty(index){

    if(cart[index].quantity > 1){

        cart[index].quantity--;

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );

        renderCart();
    }
}

function removeFromCart(index){

    cart.splice(index,1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCart();
}

function buySingleItem(index){

    const item = cart[index];

    const orderId =
    "ORD" + Date.now();

    const order = {

        orderId: orderId,

        date: new Date()
        .toLocaleDateString(),

        items: [item],

        totalAmount:
        item.price * item.quantity
    };

    let orders =
    JSON.parse(
        localStorage.getItem("orders")
    ) || [];

    orders.push(order);

    localStorage.setItem(
        "orders",
        JSON.stringify(orders)
    );

    localStorage.setItem(
        "latestOrderId",
        orderId
    );

    alert(
        item.name +
        " ordered successfully!"
    );

    window.location.href =
    "order-success.html";
}

function placeOrder(){

    if(cart.length === 0){

        alert("Cart is Empty");
        return;
    }

    const totalAmount = cart.reduce(
        (sum,item) =>
        sum + (item.price * item.quantity),
        0
    );

    const orderId =
    "ORD" + Date.now();

    const order = {

        orderId: orderId,

        date: new Date()
        .toLocaleDateString(),

        items: cart,

        totalAmount: totalAmount
    };

    let orders =
    JSON.parse(
        localStorage.getItem("orders")
    ) || [];

    orders.push(order);

    localStorage.setItem(
        "orders",
        JSON.stringify(orders)
    );

    localStorage.setItem(
        "latestOrderId",
        orderId
    );

    localStorage.removeItem("cart");

    alert("Order Placed Successfully!");

    window.location.href =
    "order-success.html";
}

renderCart();
function logout(){

    window.location.href =
    "index.html";
}

</script>
<script>

const cartCount =
JSON.parse(localStorage.getItem("cart"))
?.length || 0;

const wishlistCount =
JSON.parse(localStorage.getItem("wishlist"))
?.length || 0;

document.getElementById("cartLink")
.innerText =
`🛒 Cart (${cartCount})`;

document.getElementById("wishlistLink")
.innerText =
`❤️ Wishlist (${wishlistCount})`;

function logout(){

    window.location.href =
    "index.html";
}

</script>
</body>
</html>
