<!DOCTYPE html>
<html>

<head>
    <title>My Wishlist</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        .navbar{
            background:white;
            box-shadow:0 2px 15px rgba(0,0,0,.08);
            padding:18px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#4f46e5;
        }

        .nav-links a{
            text-decoration:none;
            color:#333;
            margin-left:25px;
            font-weight:600;
        }

        .nav-links a:hover{
            color:#4f46e5;
        }

        h1{
            text-align:center;
            margin:40px 0;
            color:#111827;
        }

        #wishlistItems{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(300px,320px));

    justify-content:center;

    gap:25px;

    padding:30px;
}

        .item-card{
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 10px 20px rgba(0,0,0,.08);
            transition:.3s;
            text-align:center;
            padding:20px;
        }

        .item-card:hover{
            transform:translateY(-8px);
        }

        .item-image{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:12px;
            margin-bottom:15px;
        }

        .item-card h3{
            margin-bottom:10px;
        }

        .item-card p{
            color:#4f46e5;
            font-size:20px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .cart-btn{
            background:#4f46e5;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            margin-right:8px;
        }

        .remove-btn{
            background:#ef4444;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
        }

        .empty{
            text-align:center;
            margin-top:80px;
            color:gray;
            grid-column:1/-1;
        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        Fashion Store
    </div>

    <div class="nav-links">

        <a href="products.html">
            Products
        </a>

        <a id="wishlistLink"
           href="wishlist.html">
            ❤️ Wishlist
        </a>

        <a id="cartLink"
           href="cart.html">
            🛒 Cart
        </a>

        <a href="order-history.html">
            📦 Orders
        </a>

        <a href="#" onclick="logout()">
            Logout
        </a>

    </div>

</nav>

<h1>❤️ My Wishlist</h1>

<div id="wishlistItems"></div>

<script>

let wishlist =
JSON.parse(localStorage.getItem("wishlist"))
|| [];

const container =
document.getElementById("wishlistItems");

function renderWishlist(){

    container.innerHTML = "";

    if(wishlist.length === 0){

        container.innerHTML = `
        <div class="empty">
            <h2>No Wishlist Items Found</h2>
        </div>
        `;

        return;
    }

    wishlist.forEach((item,index)=>{

        container.innerHTML += `
        <div class="item-card">

            <img
                src="${item.image}"
                class="item-image">

            <h3>${item.name}</h3>

            <p>₹${item.price}</p>

            <button
                class="cart-btn"
                onclick="addToCart(${index})">

                Add To Cart

            </button>

            <button
                class="remove-btn"
                onclick="removeFromWishlist(${index})">

                Remove

            </button>

        </div>
        `;
    });
}

function addToCart(index){

    const item = wishlist[index];

    let cart =
    JSON.parse(localStorage.getItem("cart"))
    || [];

    cart.push({
        ...item,
        quantity:1
    });

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert("✅ Product Added To Cart");
}

function removeFromWishlist(index){

    wishlist.splice(index,1);

    localStorage.setItem(
        "wishlist",
        JSON.stringify(wishlist)
    );

    renderWishlist();
}

renderWishlist();

const cartCount =
JSON.parse(localStorage.getItem("cart"))
?.length || 0;

const wishlistCount =
JSON.parse(localStorage.getItem("wishlist"))
?.length || 0;

document.getElementById("cartLink")
.innerText =
`🛒 Cart (${cartCount})`;

document.getElementById("wishlistLink")
.innerText =
`❤️ Wishlist (${wishlistCount})`;

function logout(){

    window.location.href =
    "index.html";
}

</script>

</body>
</html>
